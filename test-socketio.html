<!DOCTYPE html>
<html>
<head>
    <title>Test Socket.IO - MCT Notifications</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 5px;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
            font-size: 12px;
        }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        button {
            background: #0a543d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #083d2d;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>🧪 Test Socket.IO - Notifications MCT</h1>
    
    <div>
        <label>User ID (admin = 6): </label>
        <input type="number" id="userId" value="6" />
        <button onclick="connect()">Se connecter</button>
        <button onclick="disconnect()">Se déconnecter</button>
    </div>

    <h3>📋 Logs:</h3>
    <div class="log" id="logs"></div>

    <h3>🔔 Dernière notification:</h3>
    <div class="log" id="notification">Aucune notification reçue</div>

    <script>
        let socket = null;

        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.insertBefore(entry, logs.firstChild);
        }

        function connect() {
            const userId = document.getElementById('userId').value;
            
            if (socket) {
                addLog('Déjà connecté', 'error');
                return;
            }

            addLog('Connexion à http://localhost:3000...', 'info');
            
            socket = io('http://localhost:3000', {
                transports: ['websocket', 'polling']
            });

            socket.on('connect', () => {
                addLog(`✅ Connecté! Socket ID: ${socket.id}`, 'success');
                
                // Authentifier
                addLog(`🔐 Authentification user ${userId}...`, 'info');
                socket.emit('authenticate', parseInt(userId));
            });

            socket.on('disconnect', () => {
                addLog('🔌 Déconnecté', 'error');
                socket = null;
            });

            socket.on('connect_error', (error) => {
                addLog(`❌ Erreur connexion: ${error.message}`, 'error');
            });

            socket.on('new_notification', (notification) => {
                addLog(`🔔 NOTIFICATION REÇUE: ${notification.title}`, 'success');
                document.getElementById('notification').innerHTML = `
                    <strong>${notification.title}</strong><br>
                    ${notification.message}<br>
                    <small>Type: ${notification.type} | Priorité: ${notification.priority}</small>
                `;
                
                // Jouer un son (optionnel)
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBTGH0fPTgjMGHm7A7+OZURE');
                audio.play().catch(() => {});
            });

            socket.on('notification_read', (data) => {
                addLog(`✅ Notification ${data.notificationId} marquée comme lue`, 'success');
            });

            socket.on('all_notifications_read', () => {
                addLog('✅ Toutes les notifications marquées comme lues', 'success');
            });
        }

        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                addLog('Déconnecté manuellement', 'info');
            }
        }

        // Auto-connect au chargement
        window.onload = () => {
            addLog('Page chargée. Cliquez sur "Se connecter" pour tester.', 'info');
        };
    </script>
</body>
</html>
