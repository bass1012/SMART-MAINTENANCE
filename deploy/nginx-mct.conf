# ================================================================
# Configuration Nginx - MCT Maintenance
# À placer dans /etc/nginx/sites-available/mct-maintenance
# ================================================================

# API Backend
server {
    listen 80;
    server_name api.sandbox.mct.ci;

    # Redirection vers HTTPS (à décommenter après certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket support pour Socket.IO
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Fichiers uploadés
    location /uploads/ {
        alias /var/www/smartmaintenance/mct-maintenance-api/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Taille max des uploads (pour les images)
    client_max_body_size 50M;
}

# Dashboard Frontend
server {
    listen 80;
    server_name dashboard.sandbox.mct.ci;

    # Redirection vers HTTPS (à décommenter après certbot)
    # return 301 https://$host$request_uri;

    root /var/www/smartmaintenance/dashboard;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # React Router - toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité
    location ~ /\. {
        deny all;
    }
}

